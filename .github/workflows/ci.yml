name: CI

on:
  push:
  pull_request:

# Cancel any in-progress run for the same branch/PR when new commits land,
# so pushes to an open PR don't queue up redundant runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # This is an npm workspaces monorepo (backend + frontend share the root
  # package-lock.json and hoisted node_modules) — every job installs from the
  # repo root. Installing inside backend/ or frontend/ individually breaks
  # hoisting for packages like @nestjs/platform-express (see CLAUDE.md
  # "Known Issues" — the exact bug that documents why this matters).
  NODE_VERSION: '24'

jobs:
  backend:
    name: Backend (build, lint, test)
    runs-on: ubuntu-latest

    # Ephemeral Postgres for the e2e suite, which boots the full Nest app
    # (AppModule) against a real database. synchronize creates the schema
    # automatically since NODE_ENV isn't 'production' here.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cargo_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: cargo_app_test
      # CI-only placeholder — never a real secret. Must be >=16 chars to pass
      # the Joi validationSchema in app.module.ts.
      JWT_SECRET: ci-placeholder-secret-not-for-production-use
      JWT_EXPIRES_IN: 7d
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build -w backend

      - name: Lint backend
        run: npm run lint -w backend

      - name: Run backend unit tests
        run: npm run test -w backend

      - name: Run backend e2e tests
        run: npm run test:e2e -w backend

  frontend:
    name: Frontend (build, lint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build -w frontend

      - name: Lint frontend
        run: npm run lint -w frontend
